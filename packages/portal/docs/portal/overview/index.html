<!DOCTYPE html>
<html lang="ja" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>概要 | Project</title>
  <script src="https://cdn.tailwindcss.com/3.4.19"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            accent: '#6366f1',
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="/assets/portal.css" />
</head>
<body class="h-full bg-gray-50 text-gray-900 ">

  <!-- モバイルオーバーレイ -->
  <div id="sidebar-overlay" class="fixed inset-0 bg-black bg-opacity-50 z-20 hidden lg:hidden" onclick="toggleSidebar()"></div>

  <div class="flex h-full">
    <!-- サイドバー -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-64 bg-white border-r border-gray-200 z-30 transform -translate-x-full lg:translate-x-0 lg:static lg:inset-0 transition-transform duration-200">
      <div class="flex items-center h-16 px-4 border-b border-gray-200">
        <a href="/" class="flex items-center gap-2 font-bold text-gray-900 truncate">
          <span class="text-indigo-600">&#9632;</span>
          <span class="truncate">Project</span>
        </a>
      </div>
      <nav class="overflow-y-auto h-[calc(100%-4rem)] py-4">
        <div class="px-3 mb-4">
          <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1 px-3">メイン</div>
          <ul class="space-y-0.5">
            <li>
              <a
                href="/"
                class="flex items-center justify-between gap-2 px-3 py-1.5 text-sm rounded-md transition-colors
                  false"
              >
                <span class="truncate">ダッシュボード</span>
              </a>
            </li>
          </ul>
        </div>
        <div class="px-3 mb-4">
          <div class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1 px-3">プロジェクト</div>
          <ul class="space-y-0.5">
            <li>
              <a
                href="/overview"
                class="flex items-center justify-between gap-2 px-3 py-1.5 text-sm rounded-md transition-colors
                  false"
              >
                <span class="truncate">概要</span>
              </a>
            </li>
            <li>
              <a
                href="/test-cases"
                class="flex items-center justify-between gap-2 px-3 py-1.5 text-sm rounded-md transition-colors
                  false"
              >
                <span class="truncate">テストケース</span>
                <span class="text-xs text-gray-400 flex-shrink-0">737</span>
              </a>
            </li>
          </ul>
        </div>
      </nav>
    </aside>

    <!-- メインコンテンツ -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden">
      <!-- トップバー -->
      <header class="h-16 bg-white border-b border-gray-200 flex items-center px-4 gap-4">
        <button
          onclick="toggleSidebar()"
          class="lg:hidden p-2 rounded-md text-gray-500 hover:text-gray-700 hover:bg-gray-100"
        >
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>

        <nav class="flex items-center gap-1 text-sm text-gray-500 min-w-0">
          <a href="/" class="hover:text-gray-700">ホーム</a>
          <span>/</span>
          <span class="text-gray-900 truncate">概要</span>
        </nav>

        <div class="ml-auto">
          <button
            onclick="openSearch()"
            class="flex items-center gap-2 px-3 py-1.5 text-sm text-gray-500 bg-gray-100 hover:bg-gray-200 rounded-md transition-colors"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <span>検索...</span>
            <kbd class="text-xs bg-white border border-gray-200 rounded px-1">⌘K</kbd>
          </button>
        </div>
      </header>

      <!-- ページコンテンツ -->
      <main class="flex-1 overflow-y-auto p-6">
        <div class="max-w-4xl">
  <h1 class="text-2xl font-bold text-gray-900 mb-6">プロジェクト概要</h1>

  <div id="markdown-content" class="prose prose-sm max-w-none bg-white rounded-lg border border-gray-200 p-6">
    <div class="text-gray-500 text-sm">読み込み中...</div>
  </div>

  <script>
    const markdownContent = "# @shirokuma-library/portal\n\nHuman-facing documentation portal generation for shirokuma workflows.\n\n## 概要\n\n`@shirokuma-library/portal` は、shirokuma ワークフローのドキュメントポータルを生成するパッケージです。\n\n現在は骨格のみ実装されており、`--help` コマンドが動作します。\n\n## 最小スコープ（現在）\n\n- CLI バイナリ `shirokuma-portal` の提供\n- `--help` / `--version` の動作\n\n## 将来スコープ\n\n`@shirokuma-library/shirokuma-flow`（CLI パッケージ）に含まれる以下の機能を段階的に移行予定:\n\n- `generate portal` コマンド（ポータル HTML 生成）\n- `generate screenshots` コマンド（スクリーンショット取得）\n- ポータル向けジェネレーター・テンプレート群\n\n## インストール\n\n```bash\nnpm install @shirokuma-library/portal\n```\n\n## 使用方法\n\n```bash\nshirokuma-portal --help\nshirokuma-portal --version\n```\n\n## ライセンス\n\nMIT\n";
  </script>
  <script src="https://cdn.jsdelivr.net/npm/marked@17.0.5/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dompurify@3.3.3/dist/purify.min.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      const el = document.getElementById('markdown-content');
      if (el && markdownContent) {
        el.innerHTML = DOMPurify.sanitize(marked.parse(markdownContent));
      }
    });
  </script>
</div>

      </main>

      <!-- フッター -->
      <footer class="border-t border-gray-200 px-6 py-3 text-xs text-gray-500 bg-white">
        <span>Project ドキュメントポータル &copy; 2026</span>
      </footer>
    </div>
  </div>

  <!-- 検索モーダル -->
  <div id="search-modal" class="fixed inset-0 z-50 hidden">
    <div class="fixed inset-0 bg-black bg-opacity-50" onclick="closeSearch()"></div>
    <div class="fixed top-1/4 left-1/2 -translate-x-1/2 w-full max-w-xl bg-white rounded-xl shadow-2xl overflow-hidden">
      <div class="flex items-center border-b border-gray-200 px-4">
        <svg class="w-5 h-5 text-gray-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
        </svg>
        <input
          id="search-input"
          type="text"
          placeholder="検索..."
          class="flex-1 px-3 py-4 text-sm outline-none"
          oninput="onSearchInput(this.value)"
          onkeydown="onSearchKeydown(event)"
        />
        <button onclick="closeSearch()" class="text-gray-400 hover:text-gray-600 text-sm">ESC</button>
      </div>
      <div id="search-results" class="max-h-96 overflow-y-auto py-2">
        <div class="px-4 py-8 text-center text-gray-400 text-sm">キーワードを入力してください</div>
      </div>
    </div>
  </div>

  <script src="/assets/portal.js"></script>
  
</body>
</html>
